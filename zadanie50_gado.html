<html>
    <body>
        <div style="color:red; font-size:50px;">
            <script language="JavaScript">
                suma_gad=0;
                for(i_gad=1; i_gad<=1000000; i_gad++)
                {
                    suma_gad=suma_gad+1/i_gad;
                }
                document.write("suma="+suma_gad.toFixed(2)+"<br>");
            </script>
        </div>
    </body>
</html>
